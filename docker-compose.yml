# ============================================================================
# Meet Stack - Frontend + Backend + DB
# ============================================================================

services:
  # --- Local PostgreSQL database for Meet ---
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=meet_control
    volumes:
      - meet-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d meet_control"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meet-network

  # --- FastAPI Backend ---
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile.backend
    container_name: fastapi_app
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    environment:
      # Local database
      - POSTGRES_HOST=db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=meet_control
      - JWT_SECRET=7bav55v-98ad-24vv-tbcc-af2884cefa6
      - JWT_ALGORITHM=HS256
      - SUPER_ADMIN_USERNAME=admin
      - SUPER_ADMIN_PASSWORD=1234
      # PRODUCTION: must stay 0 so the database is NEVER wiped on restart.
      # Set to 1 only for a one-time fresh initialization, then back to 0.
      - RESET_DB=0
      - USE_ALEMBIC=0
      # CMS Configuration (Audio and Video servers)
      - CMS_AUDIO_URL=https://192.168.20.200:445
      - CMS_VIDEO_URL=https://192.168.20.201:445
      - CMS_USERNAME=admin
      - CMS_PASSWORD=S@p180tech
      - CMS_TIMEOUT=30
      - CMS_VERIFY_SSL=false
      # CORS Origins (comma-separated)
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://192.168.1.30:5173,http://192.168.1.30
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./Backend:/app
      - ./Backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meet-network
      
  # --- Frontend (React build served by nginx) ---
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: meetings_frontend
    restart: always
    ports:
      - "3000:5173"
    volumes:
      - ./Frontend/src:/app/src
      - ./Frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://localhost:8001 # http://192.168.1.30:8000
      - VITE_CMS_MODE=remote
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - meet-network

networks:
  meet-network:
    driver: bridge

volumes:
  meet-data:
